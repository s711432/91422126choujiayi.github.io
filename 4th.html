        <h2>書中有樹，樹中有書的綠建築</h2>
        <p>高雄市圖總館是全台灣最著名的懸吊式綠建築。建築師打破傳統圖書館沉重的結構印象，採用鋼棒懸吊頂樓鋼骨的方式建造，使內部空間達到完全無柱的境界，視野極其通透。</p>
        
        <h2>室內空間與植栽融合</h2>
        <p>中庭引入巨大的巨木天井，將自然光與綠意帶入各層閱覽區；頂樓則設有新灣花園，形成一個會呼吸的文化地標，完美體現了現代公共建築與環境共生的永續價值。</p>
